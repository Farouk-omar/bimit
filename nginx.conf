server {
    listen 80;
    listen [::]:80;

    server_name bimit.online www.bimit.online;

    root /var/www/html/current;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # PHP handler for the contact form (public/api/contact.php -> /api/contact.php).
    # Adjust the socket to your installed PHP version, e.g. /run/php/php8.3-fpm.sock
    # (find it with: ls /run/php/php*-fpm.sock).
    location ~ \.php$ {
        try_files $uri =404;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    client_max_body_size 10M;

    error_page 404 /index.html;
}
